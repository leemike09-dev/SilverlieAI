<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1.0,user-scalable=yes">
  <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=ad583612ca60b68929dc66eeb5615287"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body, #map { width:100%; height:100%; }
  </style>
</head>
<body>
  <div id="map"></div>
  <script>
    var map = new kakao.maps.Map(document.getElementById('map'), {
      center: new kakao.maps.LatLng(37.5665, 126.9780),
      level: 4
    });

    window.initMap = function(logs) {
      if (!logs || logs.length === 0) return;
      var bounds = new kakao.maps.LatLngBounds();
      var path = [];

      logs.forEach(function(log, i) {
        var pos = new kakao.maps.LatLng(log.lat, log.lng);
        path.push(pos);
        bounds.extend(pos);

        var isFirst = i === 0;
        var isLast  = i === logs.length - 1;
        var emoji   = isFirst ? '🏡' : isLast ? '📍' : '🚶';

        var marker = new kakao.maps.Marker({ position: pos, map: map });
        var t  = new Date(log.created_at);
        var ts = String(t.getHours()).padStart(2,'0') + ':' + String(t.getMinutes()).padStart(2,'0');
        var content = '<div style="padding:6px 10px;font-size:14px;white-space:nowrap;">'
          + emoji + ' ' + ts
          + (log.address ? '<br><span style="color:#666;font-size:12px;">' + log.address + '</span>' : '')
          + '</div>';
        var iw = new kakao.maps.InfoWindow({ content: content });
        kakao.maps.event.addListener(marker, 'click', function() { iw.open(map, marker); });
      });

      if (path.length > 1) {
        new kakao.maps.Polyline({
          map: map, path: path,
          strokeWeight: 5, strokeColor: '#6BAE8F',
          strokeOpacity: 0.85, strokeStyle: 'dashed'
        });
        map.setBounds(bounds, { paddingTop:40, paddingBottom:40, paddingLeft:40, paddingRight:40 });
      } else {
        map.setCenter(path[0]);
        map.setLevel(3);
      }
    };
  </script>
</body>
</html>
