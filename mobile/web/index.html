<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <!-- HTML 파일 캐시 방지 — JS/CSS는 빌드 해시로 자동 캐시버스팅 -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover, user-scalable=no" />

  <!-- PWA -->
  <link rel="manifest" href="/SilverlieAI/manifest.json" />
  <meta name="theme-color" content="#1a5fbc" />

  <!-- iOS 홈 화면 추가 -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Silver Life AI" />
  <link rel="apple-touch-icon" href="/SilverlieAI/assets/icon.png" />

  <!-- Android -->
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- 공유 미리보기 (카카오톡 등) -->
  <meta property="og:title" content="Silver Life AI" />
  <meta property="og:description" content="시니어를 위한 AI 건강 파트너 — 건강 관리, AI 상담, 커뮤니티" />
  <meta property="og:image" content="https://leemike09-dev.github.io/SilverlieAI/assets/icon.png" />
  <meta property="og:url" content="https://leemike09-dev.github.io/SilverlieAI/" />

  <title>Silver Life AI</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      background-color: #a2c8a8;
    }
    /* Safari: 실제 보이는 높이만큼만 */
    body {
      height: 100svh; /* iOS 15.4+ */
    }
    #root {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    /* React Navigation 컨테이너 flex 체인 */
    #root > div { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
    * { box-sizing: border-box; }
    /* 크롬 입력창 파란 포커스 테두리 제거 */
    input:focus, textarea:focus { outline: none !important; }
    /* 크롬 자동완성 노란/파란 배경 제거 */
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus,
    input:-webkit-autofill:active {
      -webkit-box-shadow: 0 0 0 60px #ffffff inset !important;
      -webkit-text-fill-color: inherit !important;
      transition: background-color 9999s ease-in-out 0s;
    }
  </style>

  <!-- 카카오 OAuth 콜백 코드 캡처 (React 로드 전) -->
  <script>
    (function() {
      var search = window.location.search;
      if (search) {
        var params = new URLSearchParams(search);
        var code = params.get('code');
        if (code) {
          // sessionStorage에 저장 후 URL만 클리어 (네이티브 리다이렉트 제거 — 웹에서 silverliveai:// 시도 시 페이지 리로드 유발)
          sessionStorage.setItem('kakao_auth_code', code);
          window.history.replaceState({}, '', window.location.pathname);
        }
      }
    })();
  </script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
