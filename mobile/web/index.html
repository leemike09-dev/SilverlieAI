<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover, user-scalable=no" />

  <!-- PWA -->
  <link rel="manifest" href="/SilverlieAI/manifest.json" />
  <meta name="theme-color" content="#1a5fbc" />

  <!-- iOS 홈 화면 추가 -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Silver Life AI" />
  <link rel="apple-touch-icon" href="/SilverlieAI/assets/icon.png" />

  <!-- Android -->
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- 공유 미리보기 (카카오톡 등) -->
  <meta property="og:title" content="Silver Life AI" />
  <meta property="og:description" content="시니어를 위한 AI 건강 파트너 — 건강 관리, AI 상담, 커뮤니티" />
  <meta property="og:image" content="https://leemike09-dev.github.io/SilverlieAI/assets/icon.png" />
  <meta property="og:url" content="https://leemike09-dev.github.io/SilverlieAI/" />

  <title>Silver Life AI</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      background-color: #a2c8a8;
    }
    /* Safari: 실제 보이는 높이만큼만 */
    body {
      height: 100svh; /* iOS 15.4+ */
    }
    #root {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    /* React Navigation 컨테이너 flex 체인 */
    #root > div { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
    * { box-sizing: border-box; }
  </style>

  <!-- 카카오 OAuth 콜백 코드 캡처 (React 로드 전) -->
  <script>
    (function() {
      var search = window.location.search;
      if (search) {
        var params = new URLSearchParams(search);
        var code = params.get('code');
        if (code) {
          sessionStorage.setItem('kakao_auth_code', code);
          window.history.replaceState({}, '', window.location.pathname);
          // 네이티브 앱으로 리다이렉트 시도 (APK 카카오 로그인)
          setTimeout(function() {
            window.location.href = 'silverliveai://oauth?code=' + encodeURIComponent(code);
          }, 200);
        }
      }
    })();
  </script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
