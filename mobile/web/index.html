<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover, user-scalable=no" />

  <!-- PWA -->
  <link rel="manifest" href="/SilverlieAI/manifest.json" />
  <meta name="theme-color" content="#1a5fbc" />

  <!-- iOS 홈 화면 추가 -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Silver Life AI" />
  <link rel="apple-touch-icon" href="/SilverlieAI/assets/icon.png" />

  <!-- Android -->
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- 공유 미리보기 (카카오톡 등) -->
  <meta property="og:title" content="Silver Life AI" />
  <meta property="og:description" content="시니어를 위한 AI 건강 파트너 — 건강 관리, AI 상담, 커뮤니티" />
  <meta property="og:image" content="https://leemike09-dev.github.io/SilverlieAI/assets/icon.png" />
  <meta property="og:url" content="https://leemike09-dev.github.io/SilverlieAI/" />

  <title>Silver Life AI</title>
  <style>
    :root { --app-height: 100vh; }
    html, body {
      margin: 0; padding: 0;
      overflow: hidden;
      overscroll-behavior: none;
      background-color: #a2c8a8;
    }
    #root {
      height: var(--app-height);
      overflow: hidden;
    }
    * { box-sizing: border-box; }
  </style>
  <script>
    function updateAppHeight() {
      var h = (window.visualViewport ? window.visualViewport.height : window.innerHeight) + 'px';
      document.documentElement.style.setProperty('--app-height', h);
    }
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', updateAppHeight);
    }
    window.addEventListener('resize', updateAppHeight);
    updateAppHeight();
  </script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
