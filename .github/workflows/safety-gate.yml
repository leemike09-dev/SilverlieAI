name: Safety Gate

on:
  push:
    paths:
      - 'backend/app/routers/ai.py'
      - 'backend/app/lumi-chat-kb.json'
      - 'backend/tests/test_emergency_gate.py'
      - 'backend/tests/test_session_facts.py'
  pull_request:
    paths:
      - 'backend/app/routers/ai.py'
      - 'backend/app/lumi-chat-kb.json'
      - 'backend/tests/test_emergency_gate.py'
      - 'backend/tests/test_session_facts.py'

jobs:
  static-safety:
    name: Static Safety Tests (API 불필요)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: E-01 응급 게이트 (7종)
        run: cd backend && python tests/test_emergency_gate.py

      - name: ③ session_facts 정적 (6종)
        run: cd backend && python tests/test_session_facts.py
        # API key 없으면 LLM 케이스 skip, 정적 6종만 실행 — 의도된 동작

  # LLM 테스트(F-01~B-04)는 출시 직전 수동 실행
  # cd backend && venv/bin/python3 tests/test_session_facts.py <ANTHROPIC_API_KEY>
