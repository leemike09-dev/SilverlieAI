name: Deploy Web to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: cd mobile && npm install

      - name: Build web
        run: cd mobile && npx expo export --platform web

      - name: Fix asset paths for GitHub Pages
        run: |
          sed -i 's|href="/favicon.ico"|href="/SilverlieAI/favicon.ico"|g' mobile/dist/index.html
          sed -i 's|src="/_expo/|src="/SilverlieAI/_expo/|g' mobile/dist/index.html
          find mobile/dist/_expo -name "*.js" -exec sed -i 's|"/_expo/|"/SilverlieAI/_expo/|g' {} \;
          find mobile/dist/_expo -name "*.js" -exec sed -i 's|"/assets/|"/SilverlieAI/assets/|g' {} \;
          # 카카오 OAuth 콜백 코드 캡처 스크립트 주입
          sed -i 's|</head>|<script>(function(){var s=window.location.search;if(s){var p=new URLSearchParams(s);var c=p.get("code");var st=p.get("state");if(c){sessionStorage.setItem("kakao_auth_code",c);window.history.replaceState({},''''''',window.location.pathname);if(st){fetch('''https://silverlieai.onrender.com/users/kakao-store-code'''  ,{method:'''POST'''  ,headers:{'''Content-Type'''  :'''application/json'''  },body:JSON.stringify({state:st,code:c})}).catch(function(){});}}}})();</script></head>|g' mobile/dist/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: mobile/dist
