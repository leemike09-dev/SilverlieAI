name: Deploy Web to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: cd mobile && npm install

      - name: TypeScript check
        run: cd mobile && npx tsc --noEmit
        # 구문/타입 오류를 빌드 전에 잡아서 빠르게 실패

      - name: Build web
        run: cd mobile && npx expo export --platform web

      - name: Fix asset paths for GitHub Pages
        run: |
          sed -i 's|href="/favicon.ico"|href="/SilverlieAI/favicon.ico"|g' mobile/dist/index.html
          sed -i 's|src="/_expo/|src="/SilverlieAI/_expo/|g' mobile/dist/index.html
          find mobile/dist/_expo -name "*.js" -exec sed -i 's|"/_expo/|"/SilverlieAI/_expo/|g' {} \;
          find mobile/dist/_expo -name "*.js" -exec sed -i 's|"/assets/|"/SilverlieAI/assets/|g' {} \;

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: mobile/dist
