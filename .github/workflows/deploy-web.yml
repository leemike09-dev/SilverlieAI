name: Deploy Web to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: cd mobile && npm install

      - name: TypeScript syntax check
        run: |
          cd mobile
          TSC_OUT=$(npx tsc --noEmit 2>&1 || true)
          SYNTAX_ERRORS=$(echo "$TSC_OUT" | grep "error TS" | grep -vE "TS2307|TS2304|TS2305" || true)
          if [ -n "$SYNTAX_ERRORS" ]; then
            echo "TypeScript syntax error:"
            echo "$SYNTAX_ERRORS"
            exit 1
          fi
          echo "TypeScript check passed"

      - name: Build web
        run: cd mobile && npx expo export --platform web

      - name: Verify asset paths
        run: |
          echo "=== index.html script/link tags ==="
          grep -E 'src=|href=' mobile/dist/index.html || true
          if grep -q 'src="/_expo/' mobile/dist/index.html; then
            echo "WARNING: index.html has /_expo/ path — sed fallback needed"
            sed -i 's|src="/_expo/|src="/SilverlieAI/_expo/|g' mobile/dist/index.html
          fi
          if grep -q 'href="/favicon.ico"' mobile/dist/index.html; then
            sed -i 's|href="/favicon.ico"|href="/SilverlieAI/favicon.ico"|g' mobile/dist/index.html
          fi
          find mobile/dist/_expo -name "*.js" -exec sed -i 's|"/_expo/|"/SilverlieAI/_expo/|g' {} +
          find mobile/dist/_expo -name "*.js" -exec sed -i 's|"/assets/|"/SilverlieAI/assets/|g' {} +
          echo "=== Final script tag ==="
          grep 'src=.*\.js' mobile/dist/index.html || echo "No JS script tag found!"
          if ! grep -q 'src="/SilverlieAI/' mobile/dist/index.html; then
            echo "ERROR: JS bundle path does not contain /SilverlieAI/ — deploy aborted"
            exit 1
          fi
          echo "Path check passed"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: mobile/dist
